<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create Account — Abona Shop</title>
  <script>if(localStorage.getItem('darkMode')==='true')document.documentElement.classList.add('dark');</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/shared/general.css">
  <style>
    body {
      background: var(--abona-bg);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      align-items: center;
    }
    .auth-logo { margin: 36px 0 24px; text-align: center; }
    .auth-logo img { height: 160px; width: auto; max-width: 380px; object-fit: contain; }
    .auth-box {
      background: var(--abona-card);
      border: 1px solid var(--abona-border);
      border-radius: 12px;
      padding: 28px 30px; width: 350px;
      box-shadow: 0 4px 20px var(--abona-shadow);
    }
    .auth-box h1 { font-size: 22px; font-weight: 500; margin-bottom: 20px; color: var(--abona-text); }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 4px; color: var(--abona-text); }
    .form-group input {
      width: 100%; padding: 8px 10px;
      border: 1px solid var(--abona-border);
      border-radius: 6px; font-size: 14px; outline: none; box-sizing: border-box;
      background: var(--abona-input-bg); color: var(--abona-text);
      transition: border-color 0.15s;
    }
    .form-group input:focus { border-color: #c73060; box-shadow: 0 0 0 3px rgba(199,48,96,0.15); }
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 40px; }
    .pw-eye {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; padding: 0; color: var(--abona-sub);
      display: flex; align-items: center;
    }
    .pw-eye:hover { color: var(--abona-text); }
    .pw-eye svg { width: 20px; height: 20px; }
    .form-hint { font-size: 12px; color: var(--abona-sub); margin-top: 4px; }
    .btn-submit {
      width: 100%; padding: 10px;
      background: linear-gradient(135deg, #c73060, #a8264f);
      border: 1px solid #8c1e40;
      border-radius: 6px; font-size: 14px; cursor: pointer; font-weight: 600;
      color: #fff; margin-top: 4px; transition: all 0.15s;
    }
    .btn-submit:hover { background: linear-gradient(135deg, #d9406d, #b82f59); }
    .error-msg { color: #c40000; font-size: 13px; margin-top: 10px; min-height: 16px; }
    .sign-in-link { font-size: 13px; margin-top: 16px; color: var(--abona-text); }
    .sign-in-link a { color: var(--abona-rose, #c73060); text-decoration: none; }
    .sign-in-link a:hover { text-decoration: underline; }
    .tos { font-size: 12px; color: var(--abona-sub); margin-top: 12px; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="auth-logo">
    <a href="index.html">
      <img src="images/abona.png" alt="Abona" onerror="this.style.display='none'">
    </a>
  </div>

  <div class="auth-box">
    <h1>Create account</h1>
    <form id="registerForm">
      <div class="form-group">
        <label for="name">Your name</label>
        <input type="text" id="name" placeholder="First and last name" autocomplete="name" required>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" autocomplete="username" required>
        <p class="form-hint">Must be a real, non-disposable email address.</p>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div class="pw-wrap">
          <input type="password" id="password" autocomplete="new-password" required minlength="8">
          <button type="button" class="pw-eye" onclick="togglePw('password', this)" tabindex="-1" aria-label="Show password">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
          </button>
        </div>
        <p class="form-hint">At least 8 characters.</p>
      </div>
      <div class="form-group">
        <label for="passwordConfirm">Re-enter password</label>
        <div class="pw-wrap">
          <input type="password" id="passwordConfirm" autocomplete="new-password" required>
          <button type="button" class="pw-eye" onclick="togglePw('passwordConfirm', this)" tabindex="-1" aria-label="Show password">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
          </button>
        </div>
      </div>
      <button type="submit" class="btn-submit">Create your Abona account</button>
      <p class="error-msg" id="errorMsg"></p>
    </form>

    <p class="sign-in-link">Already have an account? <a href="login.html">Sign in</a></p>
    <p class="tos">By creating an account, you agree to Abona's Conditions of Use and Privacy Notice.</p>
  </div>

  <script>
    function togglePw(id, btn) {
      const input = document.getElementById(id);
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      const svg = btn.querySelector('svg');
      svg.innerHTML = isHidden
        ? `<path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88L6.59 6.59m7.532 7.532l3.29 3.29M3 3l18 18"/>`
        : `<path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>`;
      btn.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
    }
  </script>
  <script type="module">
    import { API_BASE } from './scripts/utils/api.js';

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.textContent = '';

      const name            = document.getElementById('name').value.trim();
      const email           = document.getElementById('email').value.trim();
      const password        = document.getElementById('password').value;
      const passwordConfirm = document.getElementById('passwordConfirm').value;

      if (password !== passwordConfirm) {
        errorMsg.textContent = 'Passwords do not match.';
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/api/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ name, email, password })
        });
        const data = await res.json();
        if (!res.ok) { errorMsg.textContent = data.error; return; }
        window.location.href = 'index.html';
      } catch {
        errorMsg.textContent = 'Network error. Is the server running?';
      }
    });
  </script>
</body>
</html>
