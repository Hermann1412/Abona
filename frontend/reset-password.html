<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Password — Abona Shop</title>
  <script>if(localStorage.getItem('darkMode')==='true')document.documentElement.classList.add('dark');</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/shared/general.css">
  <style>
    body {
      background: var(--abona-bg);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      align-items: center;
    }
    .auth-logo { margin: 36px 0 24px; text-align: center; }
    .auth-logo img { height: 160px; width: auto; max-width: 380px; object-fit: contain; }
    .auth-box {
      background: var(--abona-card);
      border: 1px solid var(--abona-border);
      border-radius: 12px;
      padding: 28px 30px; width: 350px;
      box-shadow: 0 4px 20px var(--abona-shadow);
    }
    .auth-box h1 { font-size: 22px; font-weight: 500; margin-bottom: 8px; color: var(--abona-text); }
    .auth-box p { font-size: 14px; color: var(--abona-sub); margin-bottom: 20px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 4px; color: var(--abona-text); }
    .form-group input {
      width: 100%; padding: 8px 10px;
      border: 1px solid var(--abona-border);
      border-radius: 6px; font-size: 14px; outline: none; box-sizing: border-box;
      background: var(--abona-input-bg); color: var(--abona-text);
      transition: border-color 0.15s;
    }
    .form-group input:focus { border-color: #c73060; box-shadow: 0 0 0 3px rgba(199,48,96,0.15); }
    .strength-bar { height: 4px; border-radius: 2px; margin-top: 6px; background: var(--abona-border); overflow: hidden; }
    .strength-fill { height: 100%; width: 0; border-radius: 2px; transition: width 0.3s, background 0.3s; }
    .strength-label { font-size: 11px; color: var(--abona-sub); margin-top: 3px; }
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 40px; }
    .pw-eye {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; padding: 0; color: var(--abona-sub);
      display: flex; align-items: center;
    }
    .pw-eye:hover { color: var(--abona-text); }
    .pw-eye svg { width: 20px; height: 20px; }
    .btn-submit {
      width: 100%; padding: 10px;
      background: linear-gradient(135deg, #c73060, #a8264f);
      border: 1px solid #8c1e40;
      border-radius: 6px; font-size: 14px; cursor: pointer; font-weight: 600;
      color: #fff; margin-top: 4px; transition: all 0.15s;
    }
    .btn-submit:hover { background: linear-gradient(135deg, #d9406d, #b82f59); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
    .msg { font-size: 13px; margin-top: 12px; padding: 10px 12px; border-radius: 6px; display: none; }
    .msg.error   { background: #fdecea; color: #c40000; display: block; }
    .msg.success { background: #d4edda; color: #155724; display: block; }
    .invalid-token { text-align: center; padding: 20px 0; color: var(--abona-text); }
    .invalid-token .icon { font-size: 48px; }
  </style>
</head>
<body>
  <div class="auth-logo">
    <a href="index.html">
      <img src="images/abona.png" alt="Abona" onerror="this.style.display='none'">
    </a>
  </div>

  <div class="auth-box" id="auth-box">
    <p style="text-align:center;color:var(--abona-sub)">Verifying link…</p>
  </div>

  <script>
    function togglePw(id, btn) {
      const input = document.getElementById(id);
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      const svg = btn.querySelector('svg');
      svg.innerHTML = isHidden
        ? `<path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88L6.59 6.59m7.532 7.532l3.29 3.29M3 3l18 18"/>`
        : `<path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>`;
      btn.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
    }
  </script>
  <script type="module">
    import { API_BASE } from './scripts/utils/api.js';

    const token = new URLSearchParams(window.location.search).get('token');
    const box   = document.getElementById('auth-box');

    if (!token) {
      renderInvalid('No reset token found.');
    } else {
      renderForm();
    }

    function renderInvalid(msg) {
      box.innerHTML = `
        <div class="invalid-token">
          <div class="icon">🔗</div>
          <h2 style="font-size:18px;margin:12px 0 8px">Invalid or Expired Link</h2>
          <p style="font-size:14px">${msg}</p>
          <a href="forgot-password.html"
             style="display:inline-block;margin-top:16px;background:linear-gradient(135deg,#c73060,#a8264f);color:#fff;
                    text-decoration:none;padding:10px 24px;border-radius:6px;font-weight:600">
            Request a new link
          </a>
        </div>`;
    }

    function renderForm() {
      box.innerHTML = `
        <h1>Set new password</h1>
        <p>Choose a strong password for your account.</p>
        <form id="resetForm">
          <div class="form-group">
            <label for="password">New password</label>
            <div class="pw-wrap">
              <input type="password" id="password" autocomplete="new-password"
                placeholder="Min. 8 characters" required minlength="8">
              <button type="button" class="pw-eye" onclick="togglePw('password', this)" tabindex="-1" aria-label="Show password">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                </svg>
              </button>
            </div>
            <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
            <div class="strength-label" id="strengthLabel"></div>
          </div>
          <div class="form-group">
            <label for="confirm">Confirm new password</label>
            <div class="pw-wrap">
              <input type="password" id="confirm" autocomplete="new-password"
                placeholder="Repeat your password" required>
              <button type="button" class="pw-eye" onclick="togglePw('confirm', this)" tabindex="-1" aria-label="Show password">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                </svg>
              </button>
            </div>
          </div>
          <button type="submit" class="btn-submit" id="submitBtn">Reset password</button>
          <div class="msg" id="msg"></div>
        </form>`;

      document.getElementById('password').addEventListener('input', (e) => {
        const val   = e.target.value;
        const fill  = document.getElementById('strengthFill');
        const label = document.getElementById('strengthLabel');
        let score = 0;
        if (val.length >= 8)  score++;
        if (val.length >= 12) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;

        const levels = [
          { pct: 0,   color: '',        text: '' },
          { pct: 20,  color: '#e53935', text: 'Weak' },
          { pct: 40,  color: '#fb8c00', text: 'Fair' },
          { pct: 60,  color: '#fdd835', text: 'Good' },
          { pct: 80,  color: '#43a047', text: 'Strong' },
          { pct: 100, color: '#1b5e20', text: 'Very strong' },
        ];
        const lvl = levels[score];
        fill.style.width  = lvl.pct + '%';
        fill.style.background = lvl.color;
        label.textContent = lvl.text;
        label.style.color = lvl.color;
      });

      document.getElementById('resetForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn      = document.getElementById('submitBtn');
        const msg      = document.getElementById('msg');
        const password = document.getElementById('password').value;
        const confirm  = document.getElementById('confirm').value;

        msg.className = 'msg';
        msg.textContent = '';

        if (password !== confirm) {
          msg.className = 'msg error';
          msg.textContent = 'Passwords do not match.';
          return;
        }
        if (password.length < 8) {
          msg.className = 'msg error';
          msg.textContent = 'Password must be at least 8 characters.';
          return;
        }

        btn.disabled = true;
        btn.textContent = 'Resetting…';

        try {
          const res  = await fetch(`${API_BASE}/api/auth/reset-password`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, password })
          });
          const data = await res.json();

          if (!res.ok) {
            if (res.status === 400 && data.error.includes('invalid or has expired')) {
              renderInvalid(data.error);
              return;
            }
            msg.className = 'msg error';
            msg.textContent = data.error || 'Something went wrong.';
            btn.disabled = false;
            btn.textContent = 'Reset password';
          } else {
            msg.className = 'msg success';
            msg.textContent = '✓ ' + data.message;
            btn.disabled = true;
            setTimeout(() => { window.location.href = 'login.html'; }, 2000);
          }
        } catch {
          msg.className = 'msg error';
          msg.textContent = 'Network error. Is the server running?';
          btn.disabled = false;
          btn.textContent = 'Reset password';
        }
      });
    }
  </script>
</body>
</html>
