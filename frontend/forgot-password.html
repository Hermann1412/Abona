<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Forgot Password — Abona Shop</title>
  <script>if(localStorage.getItem('darkMode')==='true')document.documentElement.classList.add('dark');</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/shared/general.css">
  <style>
    body {
      background: var(--abona-bg);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      align-items: center;
    }
    .auth-logo { margin: 36px 0 24px; text-align: center; }
    .auth-logo img { height: 160px; width: auto; max-width: 380px; object-fit: contain; }
    .auth-box {
      background: var(--abona-card);
      border: 1px solid var(--abona-border);
      border-radius: 12px;
      padding: 28px 30px; width: 350px;
      box-shadow: 0 4px 20px var(--abona-shadow);
    }
    .auth-box h1 { font-size: 22px; font-weight: 500; margin-bottom: 8px; color: var(--abona-text); }
    .auth-box p { font-size: 14px; color: var(--abona-sub); margin-bottom: 20px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 4px; color: var(--abona-text); }
    .form-group input {
      width: 100%; padding: 8px 10px;
      border: 1px solid var(--abona-border);
      border-radius: 6px; font-size: 14px; outline: none; box-sizing: border-box;
      background: var(--abona-input-bg); color: var(--abona-text);
      transition: border-color 0.15s;
    }
    .form-group input:focus { border-color: #c73060; box-shadow: 0 0 0 3px rgba(199,48,96,0.15); }
    .btn-submit {
      width: 100%; padding: 10px;
      background: linear-gradient(135deg, #c73060, #a8264f);
      border: 1px solid #8c1e40;
      border-radius: 6px; font-size: 14px; cursor: pointer; font-weight: 600;
      color: #fff; margin-top: 4px; transition: all 0.15s;
    }
    .btn-submit:hover { background: linear-gradient(135deg, #d9406d, #b82f59); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
    .msg { font-size: 13px; margin-top: 12px; padding: 10px 12px; border-radius: 6px; display: none; }
    .msg.error   { background: #fdecea; color: #c40000; display: block; }
    .msg.success { background: #d4edda; color: #155724; display: block; }
    .back-link { margin-top: 20px; text-align: center; font-size: 13px; }
    .back-link a { color: var(--abona-rose, #c73060); text-decoration: none; }
    .back-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="auth-logo">
    <a href="index.html">
      <img src="images/abona.png" alt="Abona" onerror="this.style.display='none'">
    </a>
  </div>

  <div class="auth-box">
    <h1>Forgot your password?</h1>
    <p>Enter the email address linked to your account and we'll send you a reset link.</p>

    <form id="forgotForm">
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" autocomplete="email" placeholder="you@example.com" required>
      </div>
      <button type="submit" class="btn-submit" id="submitBtn">Send reset link</button>
      <div class="msg" id="msg"></div>
    </form>

    <div class="back-link">
      <a href="login.html">← Back to Sign in</a>
    </div>
  </div>

  <script type="module">
    import { API_BASE } from './scripts/utils/api.js';

    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn  = document.getElementById('submitBtn');
      const msg  = document.getElementById('msg');
      const email = document.getElementById('email').value.trim();

      msg.className = 'msg';
      msg.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Sending…';

      try {
        const res  = await fetch(`${API_BASE}/api/auth/forgot-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();

        if (res.status === 429) {
          msg.className = 'msg error';
          msg.textContent = data.error;
        } else if (!res.ok) {
          msg.className = 'msg error';
          msg.textContent = data.error || 'Something went wrong.';
        } else {
          msg.className = 'msg success';
          msg.textContent = '✓ ' + data.message;
          document.getElementById('forgotForm').reset();
        }
      } catch {
        msg.className = 'msg error';
        msg.textContent = 'Network error. Is the server running?';
      }

      btn.disabled = false;
      btn.textContent = 'Send reset link';
    });
  </script>
</body>
</html>
